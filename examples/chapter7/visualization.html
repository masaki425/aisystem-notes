<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念ネットワーク — QT45リボザイム (Gianni et al., Science 2026)</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden}
#container{width:100vw;height:100vh;position:relative}
svg{width:100%;height:100%}
.link{fill:none;stroke-opacity:0.5}.link:hover{stroke-opacity:1}
.node-circle{cursor:pointer;stroke-width:2}.node-circle:hover{stroke-width:3;filter:brightness(1.3)}
.node-label{font-size:11px;fill:#c9d1d9;pointer-events:none;font-weight:400}
.node-label-center{font-size:13px;fill:#f0f6fc;font-weight:700}
#legend{position:absolute;top:16px;left:16px;background:rgba(22,27,34,0.92);border:1px solid rgba(99,110,123,0.4);border-radius:10px;padding:16px;font-size:12px;z-index:10}
#legend h3{font-size:13px;font-weight:700;color:#f0f6fc;margin-bottom:10px;letter-spacing:0.05em}
.legend-section{margin-bottom:12px}
.legend-section-title{font-size:11px;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-line{width:20px;height:0;border-top:2px solid;flex-shrink:0}
#detail{position:absolute;bottom:16px;left:16px;right:16px;background:rgba(22,27,34,0.95);border:1px solid rgba(99,110,123,0.4);border-radius:10px;padding:16px 20px;font-size:13px;z-index:10;display:none;max-width:600px}
#detail h4{font-size:14px;font-weight:700;color:#f0f6fc;margin-bottom:4px}
#detail .detail-type{font-size:11px;color:#8b949e;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
#detail .detail-desc{line-height:1.6;color:#c9d1d9}
#title-box{position:absolute;top:16px;right:16px;text-align:right;z-index:10}
#title-box h1{font-size:15px;font-weight:700;color:#f0f6fc}
#title-box p{font-size:11px;color:#8b949e;margin-top:2px}
#instructions{position:absolute;bottom:16px;right:16px;font-size:11px;color:#484f58;z-index:5;text-align:right;line-height:1.6}
</style>
</head>
<body>
<div id="container">
<svg id="graph"></svg>
<div id="legend">
<h3>概念ネットワーク</h3>
<div class="legend-section">
<div class="legend-section-title">ノードの種類</div>
<div class="legend-item"><span class="legend-dot" style="background:#58a6ff"></span> concept（理論・仮説）</div>
<div class="legend-item"><span class="legend-dot" style="background:#3fb950"></span> entity（分子・物質）</div>
<div class="legend-item"><span class="legend-dot" style="background:#d2a8ff"></span> process（プロセス）</div>
<div class="legend-item"><span class="legend-dot" style="background:#f9c74f"></span> property（性質）</div>
<div class="legend-item"><span class="legend-dot" style="background:#79c0ff"></span> method（手法）</div>
<div class="legend-item"><span class="legend-dot" style="background:#56d4dd"></span> condition（条件）</div>
<div class="legend-item"><span class="legend-dot" style="background:#f85149"></span> problem（課題）</div>
</div>
<div class="legend-section">
<div class="legend-section-title">エッジの種類</div>
<div class="legend-item"><span class="legend-line" style="border-color:#3fb950"></span> causes / produces</div>
<div class="legend-item"><span class="legend-line" style="border-color:#58a6ff"></span> requires</div>
<div class="legend-item"><span class="legend-line" style="border-color:#d2a8ff"></span> supports</div>
<div class="legend-item"><span class="legend-line" style="border-color:#f85149"></span> inhibits</div>
<div class="legend-item"><span class="legend-line" style="border-color:#f9c74f"></span> contains / derives</div>
<div class="legend-item"><span class="legend-line" style="border-color:#8b949e;border-style:dashed"></span> compares</div>
</div>
</div>
<div id="title-box">
<h1>QT45リボザイム — 概念ネットワーク</h1>
<p>Gianni et al., Science (2026) · 段階4出力 · 28ノード 32エッジ</p>
</div>
<div id="detail">
<h4 id="detail-label"></h4>
<div class="detail-type" id="detail-type"></div>
<div class="detail-desc" id="detail-desc"></div>
</div>
<div id="instructions">ノードをクリックで詳細表示<br>ドラッグで移動 · スクロールでズーム</div>
</div>
<script>
const nodes=[
{id:"rna_world",label:"RNAワールド仮説",type:"concept",description:"触媒能を持つRNAが自己複製を駆動し、初期地球で生命の起源となったとする仮説。"},
{id:"eigen_error_threshold",label:"アイゲンの誤り閾値",type:"concept",description:"複製の忠実度と配列長の関係から、遺伝情報を維持可能な最大配列長を規定する理論。"},
{id:"quasispecies",label:"準種",type:"concept",description:"変異体の集団として存在する自己複製体の理論的枠組み。"},
{id:"qt45_ribozyme",label:"QT45リボザイム",type:"entity",description:"45ntの小型RNAポリメラーゼリボザイム。自身の相補鎖と自身のコピーを合成可能。"},
{id:"qt51_ribozyme",label:"QT51リボザイム",type:"entity",description:"1-40モチーフから最適化された51ntのリボザイム。"},
{id:"three_motifs",label:"3つの独立RNAモチーフ",type:"entity",description:"11ラウンドの選択後に同定された3つの非関連RNAモチーフ。"},
{id:"class_i_polymerase",label:"クラスIポリメラーゼ",type:"entity",description:"既存の大型（約150〜300nt）RNAポリメラーゼリボザイム群。"},
{id:"five_tu_ribozyme",label:"5TUリボザイム",type:"entity",description:"クラスIポリメラーゼリボザイムの一つ。比較対照として使用。"},
{id:"triplet_substrates",label:"トリプレット基質",type:"entity",description:"3塩基のRNA三リン酸基質。"},
{id:"hexamer_substrate",label:"ヘキサマー補助基質",type:"entity",description:"鎖阻害を緩和する6塩基RNA。"},
{id:"hammerhead_ribozyme",label:"ハンマーヘッドリボザイム",type:"entity",description:"QT45による機能的RNA合成の実証に使用。"},
{id:"random_sequence_pool",label:"ランダム配列プール",type:"entity",description:"約6×10¹²ユニーク配列を含むRNA配列プール。"},
{id:"self_replication",label:"RNA自己複製",type:"process",description:"リボザイムが自身の相補鎖(-)と自身(+)の両方を合成する自己複製サイクル。"},
{id:"minus_strand_synthesis",label:"(-)鎖合成",type:"process",description:"QT45(+)鎖が鋳型兼触媒として機能し、相補的な(-)鎖を合成。"},
{id:"plus_strand_synthesis",label:"(+)鎖合成",type:"process",description:"QT45(+)鎖が(-)鎖鋳型上で自身を合成。ヘキサマー補助が必要。"},
{id:"rna_templated_rna_synthesis",label:"RNA鋳型依存的RNA合成",type:"process",description:"QT45が触媒するRNA鋳型に依存したRNA合成。"},
{id:"folding_equilibrium",label:"フォールディング平衡",type:"process",description:"QT45が触媒型と鋳型型の間で平衡を形成する。"},
{id:"rna_recombination",label:"RNA組換え",type:"process",description:"部分伸長産物とリボザイム間の非酵素的組換え反応。"},
{id:"synthesis_fidelity",label:"合成忠実度",type:"property",description:"QT45の平均忠実度は92.6〜94.1%/ヌクレオチド。"},
{id:"trans_activity",label:"トランス触媒活性",type:"property",description:"配列非依存的な三次的接触のみで触媒する高度な活性様式。"},
{id:"regiospecificity",label:"3'-5'結合位置特異性",type:"property",description:"正規の3'-5'ホスホジエステル結合を位置特異的に形成。"},
{id:"ribozyme_abundance",label:"リボザイム存在頻度",type:"property",description:"配列空間における存在頻度は9.5×10⁻¹⁷と推定。"},
{id:"de_novo_selection",label:"de novo選択",type:"method",description:"ランダム配列プールからリボザイムを選択するin vitro進化手法。"},
{id:"fitness_landscape_analysis",label:"適応度ランドスケープ解析",type:"method",description:"QT45の全変異体の適応度を網羅的に定量する解析。"},
{id:"ph_freeze_thaw_cycles",label:"pH/凍結融解サイクル",type:"method",description:"鎖分離を促進し反復的RNA複製を可能にする条件サイクル。"},
{id:"eutectic_ice",label:"共晶氷条件",type:"condition",description:"リボザイム安定化と基質濃縮によりポリメラーゼ活性を増強する凍結条件。"},
{id:"strand_inhibition",label:"鎖阻害問題",type:"problem",description:"(+)(-)鎖二本鎖形成が自己複製サイクル閉環を阻害する問題。"},
{id:"size_paradox",label:"サイズのパラドックス",type:"problem",description:"ポリメラーゼ活性に必要なサイズが自己複製と自発的出現を妨げる矛盾。"}
];
const edges=[
{source:"de_novo_selection",target:"three_motifs",relation:"produces"},
{source:"random_sequence_pool",target:"de_novo_selection",relation:"requires"},
{source:"three_motifs",target:"qt51_ribozyme",relation:"derives"},
{source:"qt51_ribozyme",target:"qt45_ribozyme",relation:"derives"},
{source:"qt45_ribozyme",target:"rna_templated_rna_synthesis",relation:"causes"},
{source:"qt45_ribozyme",target:"minus_strand_synthesis",relation:"causes"},
{source:"qt45_ribozyme",target:"plus_strand_synthesis",relation:"causes"},
{source:"qt45_ribozyme",target:"hammerhead_ribozyme",relation:"produces"},
{source:"minus_strand_synthesis",target:"self_replication",relation:"requires"},
{source:"plus_strand_synthesis",target:"self_replication",relation:"requires"},
{source:"rna_templated_rna_synthesis",target:"triplet_substrates",relation:"requires"},
{source:"plus_strand_synthesis",target:"hexamer_substrate",relation:"requires"},
{source:"self_replication",target:"rna_world",relation:"supports"},
{source:"qt45_ribozyme",target:"rna_world",relation:"supports"},
{source:"fitness_landscape_analysis",target:"qt45_ribozyme",relation:"supports"},
{source:"strand_inhibition",target:"self_replication",relation:"inhibits"},
{source:"hexamer_substrate",target:"strand_inhibition",relation:"inhibits"},
{source:"size_paradox",target:"class_i_polymerase",relation:"inhibits"},
{source:"qt45_ribozyme",target:"size_paradox",relation:"inhibits"},
{source:"eutectic_ice",target:"qt45_ribozyme",relation:"causes"},
{source:"ph_freeze_thaw_cycles",target:"self_replication",relation:"causes"},
{source:"qt45_ribozyme",target:"class_i_polymerase",relation:"compares"},
{source:"qt45_ribozyme",target:"five_tu_ribozyme",relation:"compares"},
{source:"five_tu_ribozyme",target:"class_i_polymerase",relation:"contains"},
{source:"qt45_ribozyme",target:"trans_activity",relation:"contains"},
{source:"qt45_ribozyme",target:"regiospecificity",relation:"contains"},
{source:"qt45_ribozyme",target:"synthesis_fidelity",relation:"contains"},
{source:"synthesis_fidelity",target:"eigen_error_threshold",relation:"derives"},
{source:"eigen_error_threshold",target:"quasispecies",relation:"derives"},
{source:"qt45_ribozyme",target:"ribozyme_abundance",relation:"supports"},
{source:"folding_equilibrium",target:"minus_strand_synthesis",relation:"causes"},
{source:"rna_recombination",target:"self_replication",relation:"supports"}
];
const nodeColors={concept:"#58a6ff",entity:"#3fb950",process:"#d2a8ff",property:"#f9c74f",method:"#79c0ff",condition:"#56d4dd",problem:"#f85149"};
const edgeColors={causes:"#3fb950",produces:"#3fb950",requires:"#58a6ff",supports:"#d2a8ff",inhibits:"#f85149",contains:"#f9c74f",derives:"#f9c74f",compares:"#8b949e"};
const width=window.innerWidth,height=window.innerHeight;
const svg=d3.select("#graph"),g=svg.append("g");
const zoom=d3.zoom().scaleExtent([0.2,4]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);
const defs=svg.append("defs");
Object.entries(edgeColors).forEach(([rel,color])=>{
defs.append("marker").attr("id",`arrow-${rel}`).attr("viewBox","0 -4 8 8").attr("refX",20).attr("refY",0).attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto").append("path").attr("d","M0,-4L8,0L0,4Z").attr("fill",color).attr("fill-opacity",0.7);
});
const degreeMap={};nodes.forEach(n=>degreeMap[n.id]=0);edges.forEach(e=>{degreeMap[e.source]++;degreeMap[e.target]++});
const maxDegree=Math.max(...Object.values(degreeMap));
const simulation=d3.forceSimulation(nodes).force("link",d3.forceLink(edges).id(d=>d.id).distance(100)).force("charge",d3.forceManyBody().strength(-400)).force("center",d3.forceCenter(width/2,height/2)).force("collision",d3.forceCollide().radius(d=>nodeRadius(d)+8));
function nodeRadius(d){const deg=degreeMap[d.id]||1;return 8+(deg/maxDegree)*16}
const link=g.append("g").selectAll("line").data(edges).join("line").attr("class","link").attr("stroke",d=>edgeColors[d.relation]).attr("stroke-width",d=>d.relation==="compares"?1:1.5).attr("stroke-dasharray",d=>d.relation==="compares"?"4,3":null).attr("marker-end",d=>`url(#arrow-${d.relation})`);
const node=g.append("g").selectAll("g").data(nodes).join("g").call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}));
node.append("circle").attr("class","node-circle").attr("r",d=>nodeRadius(d)).attr("fill",d=>nodeColors[d.type]).attr("fill-opacity",0.85).attr("stroke",d=>nodeColors[d.type]).attr("stroke-opacity",0.4);
node.append("text").attr("class",d=>d.id==="qt45_ribozyme"?"node-label node-label-center":"node-label").attr("dx",d=>nodeRadius(d)+4).attr("dy",4).text(d=>d.label);
node.on("click",(e,d)=>{document.getElementById("detail-label").textContent=d.label;document.getElementById("detail-type").textContent=`${d.type} · ${d.id}`;document.getElementById("detail-desc").textContent=d.description;document.getElementById("detail").style.display="block"});
svg.on("click",e=>{if(e.target.tagName==="svg")document.getElementById("detail").style.display="none"});
node.on("mouseover",(e,d)=>{const connected=new Set();edges.forEach(edge=>{const s=typeof edge.source==="object"?edge.source.id:edge.source;const t=typeof edge.target==="object"?edge.target.id:edge.target;if(s===d.id)connected.add(t);if(t===d.id)connected.add(s)});connected.add(d.id);node.select("circle").attr("fill-opacity",n=>connected.has(n.id)?0.95:0.15);node.select("text").attr("opacity",n=>connected.has(n.id)?1:0.15);link.attr("stroke-opacity",l=>{const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;return(s===d.id||t===d.id)?0.9:0.05})}).on("mouseout",()=>{node.select("circle").attr("fill-opacity",0.85);node.select("text").attr("opacity",1);link.attr("stroke-opacity",0.5)});
simulation.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`)});
setTimeout(()=>{const bounds=g.node().getBBox();const scale=Math.min(width/(bounds.width+100),height/(bounds.height+100))*0.85;const tx=(width-bounds.width*scale)/2-bounds.x*scale;const ty=(height-bounds.height*scale)/2-bounds.y*scale;svg.transition().duration(800).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale))},1500);
</script>
</body>
</html>
