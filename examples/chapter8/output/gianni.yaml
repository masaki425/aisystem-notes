metadata:
  title: "A small polymerase ribozyme that can synthesize itself and its complementary strand"
  authors:
    - Edoardo Gianni
    - Samantha L. Y. Kwok
    - Christopher J. K. Wan
    - Kevin Goeij
    - Bryce E. Clifton
    - Enrico S. Colizzi
    - James Attwater
    - Philipp Holliger
  journal: Science
  year: 2026
  doi: "10.1126/science.adt2760"
  description: >
    45ヌクレオチドのRNAポリメラーゼリボザイム（QT45）をランダム配列プールから発見し、
    トリヌクレオチド三リン酸基質を用いてRNA鋳型依存的RNA合成を触媒できることを示した。
    QT45は自身の相補鎖および自身のコピーを合成でき、RNAの自己複製に向けた重要な進展を報告する。

nodes:
  - id: rna_world_hypothesis
    label: RNAワールド仮説
    type: concept
    description: >
      触媒活性を持つRNA（リボザイム）が原始地球上でランダムなRNAオリゴマープールから出現し、
      自己複製を駆動したとする仮説。

  - id: qt45_ribozyme
    label: QT45リボザイム
    type: entity
    description: >
      45ヌクレオチドからなる小型RNAポリメラーゼリボザイム。ランダム配列プールからde novo選択により発見された。

  - id: rna_self_replication
    label: RNA自己複製
    type: process
    description: >
      リボザイムが自身の相補鎖（(-)鎖）と自身（(+)鎖）の両方を鋳型依存的に合成する自己複製サイクル。

  - id: triplet_substrates
    label: トリヌクレオチド三リン酸基質
    type: entity
    description: >
      RNAの3塩基単位の基質（pppNNN）。構造化されたRNA鋳型のコピーを可能にし、
      鎖の再アニーリングを抑制する。

  - id: eutectic_ice
    label: 共晶氷
    type: condition
    description: >
      弱アルカリ性の共晶氷環境。リボザイムの安定化と基質の濃縮を同時に実現し、
      ポリメラーゼ活性を促進する。

  - id: in_vitro_selection
    label: in vitro選択
    type: method
    description: >
      ランダム配列プール（約6×10^12の固有RNA配列）から機能的リボザイムを選別する実験手法。
      18ラウンドの選択を経てQTリボザイムを発見した。

  - id: complementary_strand_synthesis
    label: 相補鎖（(-)鎖）合成
    type: process
    description: >
      QT45が自身を鋳型兼触媒として相補鎖を合成するプロセス。ランダムトリプレットプールを用いて
      94.1%のヌクレオチド忠実度で達成（収率約0.24%、72日間）。

  - id: self_synthesis
    label: 自己合成（(+)鎖合成）
    type: process
    description: >
      QT45が(-)鎖鋳型から自身の(+)鎖コピーを合成するプロセス。定義基質とヘキサマーの補助により
      収率約0.17%で達成（72日間）。

  - id: class_i_polymerase
    label: クラスIポリメラーゼリボザイム
    type: entity
    description: >
      クラスIリガーゼリボザイムから進化的に派生した既存のRNAポリメラーゼリボザイム群（150〜300ヌクレオチド）。
      サイズが大きく自己複製には至っていない。

  - id: rna_ensemble_equilibrium
    label: RNAアンサンブル平衡
    type: concept
    description: >
      同一反応中でQT45が折りたたまれた触媒形態と展開された鋳型形態の間で動的平衡を保つ概念。
      トリプレット濃度により平衡が調節される。

  - id: strand_inhibition
    label: 鎖阻害問題
    type: problem
    description: >
      (+)鎖と(-)鎖が二重鎖を形成し、不活性な行き止まり産物となることで自己複製を妨げる問題。

  - id: hexamer_substrate
    label: ヘキサマー基質
    type: entity
    description: >
      6塩基のRNA基質（pppAUUGAU）。(-)鎖鋳型のAUリッチなアピカルループ領域に結合し、
      鎖阻害を解消して(+)鎖の全長合成を可能にする。

  - id: fitness_landscape
    label: フィットネスランドスケープ解析
    type: method
    description: >
      QT45の全単一変異体・単一欠失・98%の二重変異体の適応度を定量化し、
      機能的コア構造と配列要件を明らかにした包括的解析。

  - id: hammerhead_ribozyme_synthesis
    label: ハンマーヘッドリボザイム合成
    type: process
    description: >
      QT45が33ヌクレオチドのハンマーヘッドエンドヌクレアーゼリボザイム（seq0-HH）を合成するプロセス。
      合成産物はエンドヌクレアーゼ活性を保持していた。

  - id: replication_fidelity
    label: 複製忠実度
    type: property
    description: >
      RNAコピーの正確性を示す指標。QT45は92.6〜94.1%のヌクレオチド忠実度を達成。
      G:Uウォブル誤対合が主要な誤りの原因である。

  - id: eigen_error_threshold
    label: Eigenのエラー閾値
    type: concept
    description: >
      自己複製するポリマーが遺伝情報を維持できる最大配列長を定義する理論的閾値。
      QT45の短さはこの閾値の観点で有利に働く。

  - id: prebiotic_emergence
    label: プレバイオティック出現可能性
    type: concept
    description: >
      QT45の小さなサイズ（45nt）は非酵素的RNA重合で到達可能な長さに近く、
      原始地球上での自発的出現の妥当性を高める。

  - id: structured_template_copying
    label: 構造化鋳型のコピー
    type: process
    description: >
      ステムループ構造を含むRNA鋳型の逆相補鎖を合成する能力。
      QT45は4〜8塩基対のステムループ鋳型をコピーできる。

  - id: rna_recombination
    label: RNA組換え
    type: process
    description: >
      トランスエステル化反応による部分伸長産物とリボザイム間の組換え。
      進化の加速やMullerのラチェットの軽減に有利に働く可能性がある。

  - id: ph_freeze_thaw_cycles
    label: pH/凍結融解サイクル
    type: condition
    description: >
      反復的なpH変化と凍結融解を組み合わせた条件。
      QT45による二本鎖RNA鋳型の同時コピー（ワンポット反応）を可能にする。

edges:
  - source: rna_world_hypothesis
    target: rna_self_replication
    relation: requires
    description: RNAワールド仮説はリボザイムによるRNA自己複製の実現を前提とする。

  - source: in_vitro_selection
    target: qt45_ribozyme
    relation: produces
    description: ランダム配列プールからのde novo選択により、QT45リボザイムが発見された。

  - source: qt45_ribozyme
    target: complementary_strand_synthesis
    relation: causes
    description: QT45は自身を鋳型かつ触媒として相補鎖の合成を触媒する。

  - source: qt45_ribozyme
    target: self_synthesis
    relation: causes
    description: QT45は(-)鎖鋳型上で自身の(+)鎖コピーを合成する。

  - source: triplet_substrates
    target: qt45_ribozyme
    relation: requires
    description: QT45のポリメラーゼ活性にはトリヌクレオチド三リン酸基質が必要である。

  - source: eutectic_ice
    target: qt45_ribozyme
    relation: supports
    description: 共晶氷環境はQT45の安定化と基質濃縮を通じて触媒活性を促進する。

  - source: complementary_strand_synthesis
    target: rna_self_replication
    relation: requires
    description: 相補鎖合成は自己複製サイクルの第一段階として必要である。

  - source: self_synthesis
    target: rna_self_replication
    relation: requires
    description: 自己合成は自己複製サイクルの第二段階として必要である。

  - source: strand_inhibition
    target: self_synthesis
    relation: inhibits
    description: (+)(-)鎖二重鎖の形成が(+)鎖の全長合成を阻害する。

  - source: hexamer_substrate
    target: strand_inhibition
    relation: inhibits
    description: ヘキサマー基質がアピカルループ領域に結合し、鎖阻害を解消する。

  - source: rna_ensemble_equilibrium
    target: complementary_strand_synthesis
    relation: supports
    description: 折りたたみ平衡により触媒型と鋳型型が共存し、相補鎖合成が可能になる。

  - source: triplet_substrates
    target: rna_ensemble_equilibrium
    relation: causes
    description: トリプレット濃度がRNA折りたたみ平衡を調節し、鋳型型への移行を促進する。

  - source: qt45_ribozyme
    target: class_i_polymerase
    relation: compares
    description: QT45（45nt）はクラスIポリメラーゼ（150〜300nt）の5分の1以下のサイズで同等の機能を持つ。

  - source: fitness_landscape
    target: qt45_ribozyme
    relation: supports
    description: フィットネスランドスケープ解析がQT45のコア構造と配列要件を解明した。

  - source: qt45_ribozyme
    target: hammerhead_ribozyme_synthesis
    relation: causes
    description: QT45は機能的なハンマーヘッドリボザイムを合成できる。

  - source: replication_fidelity
    target: eigen_error_threshold
    relation: supports
    description: 複製忠実度がEigenのエラー閾値を超えれば遺伝情報の維持が可能になる。

  - source: qt45_ribozyme
    target: replication_fidelity
    relation: produces
    description: QT45は92.6〜94.1%のヌクレオチド忠実度で複製産物を生成する。

  - source: qt45_ribozyme
    target: prebiotic_emergence
    relation: supports
    description: QT45の小型サイズは原始地球上での自発的出現の妥当性を高める。

  - source: qt45_ribozyme
    target: structured_template_copying
    relation: causes
    description: QT45はステムループ構造を持つRNA鋳型をコピーできる。

  - source: structured_template_copying
    target: hammerhead_ribozyme_synthesis
    relation: requires
    description: 機能的リボザイム合成には構造化鋳型のコピー能力が前提となる。

  - source: rna_recombination
    target: rna_self_replication
    relation: supports
    description: RNA組換えは進化を加速しMullerのラチェットを緩和するため、自己複製に有利に働く。

  - source: ph_freeze_thaw_cycles
    target: rna_self_replication
    relation: supports
    description: pH/凍結融解サイクルは二本鎖RNA鋳型の同時コピーを可能にし、反復的複製を支援する。

  - source: prebiotic_emergence
    target: rna_world_hypothesis
    relation: supports
    description: 小型ポリメラーゼリボザイムの出現可能性がRNAワールド仮説の妥当性を支持する。

  - source: eigen_error_threshold
    target: rna_self_replication
    relation: requires
    description: 自己複製の持続にはEigenのエラー閾値を下回る誤り率が必要である。
