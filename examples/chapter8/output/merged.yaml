metadata:
  title: 概念ネットワーク統合 — 生命の起源に関する3論文
  description: Gianni, Moody, Yarus の3論文から抽出した概念ネットワークの統合
  sources:
  - title: A small polymerase ribozyme that can synthesize itself and its complementary
      strand
    authors:
    - Edoardo Gianni
    - Samantha L. Y. Kwok
    - Christopher J. K. Wan
    - Kevin Goeij
    - Bryce E. Clifton
    - Enrico S. Colizzi
    - James Attwater
    - Philipp Holliger
    journal: Science
    year: 2026
    doi: 10.1126/science.adt2760
    description: '45ヌクレオチドのRNAポリメラーゼリボザイム（QT45）をランダム配列プールから発見し、 トリヌクレオチド三リン酸基質を用いてRNA鋳型依存的RNA合成を触媒できることを示した。
      QT45は自身の相補鎖および自身のコピーを合成でき、RNAの自己複製に向けた重要な進展を報告する。

      '
  - title: The nature of the last universal common ancestor and its impact on the
      early Earth system
    authors:
    - Edmund R. R. Moody
    - Sandra Álvarez-Carretero
    - Tara A. Mahendrarajah
    - James W. Clark
    - Holly C. Betts
    - Nina Dombrowski
    - Xi Chen
    - Lénárd L. Szánthó
    - Gergely J. Szöllősi
    - Anja Spang
    - Richard A. Boyle
    - Stuart Daines
    - Tom A. Williams
    - Nick Lane
    - Ziheng Yang
    - Graham A. Shields
    - Davide Pisani
    - Timothy M. Lenton
    - Philip C. J. Donoghue
    journal: Nature Ecology & Evolution
    year: 2024
    doi: 10.1038/s41559-024-02461-1
    description: LUCAの年代（約42億年前）をpre-LUCA遺伝子重複のベイズ分岐時間解析により推定し、系統的reconciliationによりLUCAのゲノムサイズ（約2.75
      Mb、約2,600タンパク質）と代謝能力を再構成した研究。LUCAは嫌気性酢酸生成菌であり、初期の生態系の一部として存在していたことを示す。
  - title: 'RNA-Amino Acid Binding: A Stereochemical Era for the Genetic Code'
    authors:
    - Michael Yarus
    - Jeremy Joseph Widmann
    - Rob Knight
    journal: Journal of Molecular Evolution
    year: 2009
    doi: 10.1007/s00239-009-9270-1
    description: 'RNAアプタマー・リボスイッチ・RNP複合体の構造データを統合し、 RNAがアミノ酸と特異的に結合する化学原理（極性プロファイル）を解明。
      337の独立結合部位の統計解析により、コグネートコドン・アンチコドンが 結合部位内に有意に濃縮されることを示し、遺伝暗号の起源に立体化学的時代が 存在したことを論証。DRTモデルによる翻訳起源の経路を提案。

      '
nodes:
- id: rna_world_hypothesis
  label: RNAワールド仮説
  type: concept
  description: '触媒活性を持つRNA（リボザイム）が原始地球上でランダムなRNAオリゴマープールから出現し、 自己複製を駆動したとする仮説。

    '
- id: qt45_ribozyme
  label: QT45リボザイム
  type: entity
  description: '45ヌクレオチドからなる小型RNAポリメラーゼリボザイム。ランダム配列プールからde novo選択により発見された。

    '
- id: rna_self_replication
  label: RNA自己複製
  type: process
  description: 'リボザイムが自身の相補鎖（(-)鎖）と自身（(+)鎖）の両方を鋳型依存的に合成する自己複製サイクル。

    '
- id: triplet_substrates
  label: トリヌクレオチド三リン酸基質
  type: entity
  description: 'RNAの3塩基単位の基質（pppNNN）。構造化されたRNA鋳型のコピーを可能にし、 鎖の再アニーリングを抑制する。

    '
- id: eutectic_ice
  label: 共晶氷
  type: condition
  description: '弱アルカリ性の共晶氷環境。リボザイムの安定化と基質の濃縮を同時に実現し、 ポリメラーゼ活性を促進する。

    '
- id: in_vitro_selection
  label: in vitro選択
  type: method
  description: 'ランダム配列プール（約6×10^12の固有RNA配列）から機能的リボザイムを選別する実験手法。 18ラウンドの選択を経てQTリボザイムを発見した。

    '
- id: complementary_strand_synthesis
  label: 相補鎖（(-)鎖）合成
  type: process
  description: 'QT45が自身を鋳型兼触媒として相補鎖を合成するプロセス。ランダムトリプレットプールを用いて 94.1%のヌクレオチド忠実度で達成（収率約0.24%、72日間）。

    '
- id: self_synthesis
  label: 自己合成（(+)鎖合成）
  type: process
  description: 'QT45が(-)鎖鋳型から自身の(+)鎖コピーを合成するプロセス。定義基質とヘキサマーの補助により 収率約0.17%で達成（72日間）。

    '
- id: class_i_polymerase
  label: クラスIポリメラーゼリボザイム
  type: entity
  description: 'クラスIリガーゼリボザイムから進化的に派生した既存のRNAポリメラーゼリボザイム群（150〜300ヌクレオチド）。 サイズが大きく自己複製には至っていない。

    '
- id: rna_ensemble_equilibrium
  label: RNAアンサンブル平衡
  type: concept
  description: '同一反応中でQT45が折りたたまれた触媒形態と展開された鋳型形態の間で動的平衡を保つ概念。 トリプレット濃度により平衡が調節される。

    '
- id: strand_inhibition
  label: 鎖阻害問題
  type: problem
  description: '(+)鎖と(-)鎖が二重鎖を形成し、不活性な行き止まり産物となることで自己複製を妨げる問題。

    '
- id: hexamer_substrate
  label: ヘキサマー基質
  type: entity
  description: '6塩基のRNA基質（pppAUUGAU）。(-)鎖鋳型のAUリッチなアピカルループ領域に結合し、 鎖阻害を解消して(+)鎖の全長合成を可能にする。

    '
- id: fitness_landscape
  label: フィットネスランドスケープ解析
  type: method
  description: 'QT45の全単一変異体・単一欠失・98%の二重変異体の適応度を定量化し、 機能的コア構造と配列要件を明らかにした包括的解析。

    '
- id: hammerhead_ribozyme_synthesis
  label: ハンマーヘッドリボザイム合成
  type: process
  description: 'QT45が33ヌクレオチドのハンマーヘッドエンドヌクレアーゼリボザイム（seq0-HH）を合成するプロセス。 合成産物はエンドヌクレアーゼ活性を保持していた。

    '
- id: replication_fidelity
  label: 複製忠実度
  type: property
  description: 'RNAコピーの正確性を示す指標。QT45は92.6〜94.1%のヌクレオチド忠実度を達成。 G:Uウォブル誤対合が主要な誤りの原因である。

    '
- id: eigen_error_threshold
  label: Eigenのエラー閾値
  type: concept
  description: '自己複製するポリマーが遺伝情報を維持できる最大配列長を定義する理論的閾値。 QT45の短さはこの閾値の観点で有利に働く。

    '
- id: prebiotic_emergence
  label: プレバイオティック出現可能性
  type: concept
  description: 'QT45の小さなサイズ（45nt）は非酵素的RNA重合で到達可能な長さに近く、 原始地球上での自発的出現の妥当性を高める。

    '
- id: structured_template_copying
  label: 構造化鋳型のコピー
  type: process
  description: 'ステムループ構造を含むRNA鋳型の逆相補鎖を合成する能力。 QT45は4〜8塩基対のステムループ鋳型をコピーできる。

    '
- id: rna_recombination
  label: RNA組換え
  type: process
  description: 'トランスエステル化反応による部分伸長産物とリボザイム間の組換え。 進化の加速やMullerのラチェットの軽減に有利に働く可能性がある。

    '
- id: ph_freeze_thaw_cycles
  label: pH/凍結融解サイクル
  type: condition
  description: '反復的なpH変化と凍結融解を組み合わせた条件。 QT45による二本鎖RNA鋳型の同時コピー（ワンポット反応）を可能にする。

    '
- id: luca
  label: LUCA（全生物最終共通祖先）
  type: entity
  description: Last Universal Common Ancestor。古細菌と細菌が分岐する生命の系統樹上の最も古いノードであり、約42億年前に存在したと推定される。
- id: divergence_time_analysis
  label: 分岐時間解析
  type: method
  description: ベイズ緩和分子時計法を用いて、pre-LUCA遺伝子重複から生物の分岐年代を推定する手法。MCMCtreeプログラムにより実行される。
- id: cross_bracing
  label: クロスブレーシング
  type: method
  description: 遺伝子重複後の同一種分岐イベントを対応付け、化石較正を倍増させることで年代推定の不確実性を低減する手法。
- id: pre_luca_paralogues
  label: pre-LUCAパラログ
  type: entity
  description: LUCA以前に重複した遺伝子群（ATP合成酵素サブユニット、伸長因子、tRNA合成酵素など5つ）。LUCAの年代推定の入力データとして使用。
- id: phylogenetic_reconciliation
  label: 系統的reconciliation（ALE）
  type: method
  description: ALEアルゴリズムを用いて遺伝子系統樹と種系統樹を照合し、遺伝子の重複・水平伝播・消失の履歴を確率的に推定する手法。
- id: genome_reconstruction
  label: LUCAゲノム再構成
  type: process
  description: LUCAに存在した遺伝子ファミリーの確率を推定し、ゲノムサイズ（約2.75 Mb）と約2,657のタンパク質をコードしていたと見積もるプロセス。
- id: wood_ljungdahl_pathway
  label: Wood-Ljungdahl経路（WLP）
  type: process
  description: LUCAに存在したと推定される炭素固定経路。酢酸生成的成長および/または独立栄養的成長を可能にする代謝経路。
- id: acetogenesis
  label: 酢酸生成（アセトジェネシス）
  type: process
  description: H2とCO2から酢酸を生成する代謝。LUCAの主要なエネルギー代謝であり、低エネルギー収率だが生合成コストを削減する。
- id: anaerobic_metabolism
  label: 嫌気性代謝
  type: property
  description: LUCAは末端酸化酵素を持たず嫌気性環境で生育したと推定される。酸素を利用しない代謝様式。
- id: atp_synthase
  label: ATP合成酵素
  type: entity
  description: LUCAに高い確率で存在した膜結合型酵素複合体（V/A型）。エネルギー通貨ATPの合成を担う。
- id: crispr_cas_system
  label: 初期CRISPR-Casシステム
  type: entity
  description: LUCAに存在したと推定される原始的な免疫システム。Cas3/Cas10/Cas7などのエフェクタータンパク質を持つが、Cas1/Cas2を欠く。
- id: tca_cycle
  label: TCA回路（部分的）
  type: process
  description: LUCAに部分的に存在したと推定される代謝経路。オキソグルタル酸酸化還元酵素やコハク酸脱水素酵素などの構成要素が検出された。
- id: molecular_clock
  label: 緩和分子時計モデル
  type: method
  description: GBM（幾何ブラウン運動）とILN（独立対数正規）の2つの緩和時計モデルを用いて進化速度の変動を考慮した年代推定法。
- id: fossil_calibration
  label: 化石較正
  type: method
  description: 13の化石記録と地球化学的記録に基づく較正点を設定し、分子時計解析の時間制約として使用する手法。
- id: species_tree
  label: 種系統樹
  type: entity
  description: 57の系統マーカー遺伝子から推定された700ゲノム（古細菌350、細菌350）の最尤系統樹。
- id: horizontal_gene_transfer
  label: 水平遺伝子伝播（HGT）
  type: process
  description: 種間での遺伝子の水平的な移動。ALEによるreconciliationで明示的にモデル化され、LUCA以降の遺伝子進化の推定に不可欠。
- id: early_earth_ecosystem
  label: 初期地球生態系
  type: concept
  description: LUCAが存在した約42億年前の生態系。LUCAは孤立して存在したのではなく、他の微生物代謝と共存する生態系の一部であった。
- id: hydrothermal_environment
  label: 熱水環境
  type: condition
  description: 深海の熱水噴出孔やセルペンチン化による水素供給を特徴とする、LUCAの推定生息環境の一つ。逆回転酵素の存在が超好熱性を示唆。
- id: hydrogen_recycling
  label: 水素リサイクリング
  type: process
  description: メタン生成菌が放出するCH4が大気中で光化学的にH2に変換され、表層生態系に還元される地球規模の循環システム。
- id: prokaryote_grade_organism
  label: 原核生物グレードの生物
  type: concept
  description: LUCAは原始的な前遺伝子型ではなく、現代の原核生物に匹敵するゲノムサイズと複雑な代謝を持つ原核生物レベルの生物であったという結論。
- id: kegg_orthology
  label: KEGG Orthology（KO）データベース
  type: entity
  description: 遺伝子ファミリーの機能アノテーションに使用されたデータベース。9,365の遺伝子ファミリーが同定され、LUCAの代謝再構成の基盤となった。
- id: stereochemical_hypothesis
  label: 立体化学仮説
  type: concept
  description: 'RNAとアミノ酸の間の直接的な化学的親和性が遺伝暗号の割り当ての基盤となったとする仮説。 Woese (1967) とOrgel (1968)
    に遡る。

    '
- id: genetic_code
  label: 遺伝暗号
  type: concept
  description: 'アミノ酸とコドン（3塩基配列）の対応関係。 64コドンが20種のアミノ酸と終止信号に割り当てられている。

    '
- id: rna_amino_acid_binding
  label: RNA-アミノ酸結合
  type: process
  description: 'RNAが三次構造の結合部位を形成し、特定のアミノ酸と特異的に結合するプロセス。 水素結合・スタッキング相互作用・ファンデルワールス力が関与する。

    '
- id: polar_profile
  label: 極性プロファイル
  type: concept
  description: 'RNA結合部位がアミノ酸の極性基を認識する化学的原理の要約。 α炭素置換基と側鎖の極性基の間の距離・配置を測定する。

    '
- id: rna_aptamer
  label: RNAアプタマー
  type: entity
  description: 'ランダム配列ライブラリからin vitro選択（SELEX）により 特定のリガンドに結合するよう選抜されたRNA分子。

    '
- id: riboswitch
  label: リボスイッチ
  type: entity
  description: 'mRNA内に存在し、小分子リガンドの結合により遺伝子発現を制御するRNA構造要素。 SAMリボスイッチやリジンリボスイッチなどが知られる。

    '
- id: cognate_triplet
  label: コグネートトリプレット
  type: concept
  description: '特定のアミノ酸に対応するコドンまたはアンチコドンの3塩基配列。 結合部位内に統計的に有意に濃縮されていることが示された。

    '
- id: codon_anticodon_concentration
  label: コドン・アンチコドン濃縮
  type: property
  description: 'アミノ酸結合部位内にコグネートコドン・アンチコドンが 非部位領域と比較して有意に高頻度で出現する現象（P=5.3×10⁻⁴⁵）。

    '
- id: binding_site
  label: RNA結合部位
  type: entity
  description: 'RNA分子内でアミノ酸と特異的に相互作用する領域。 337の独立した結合部位が8種のアミノ酸について同定された。

    '
- id: double_ended_profile
  label: 両端型極性プロファイル
  type: property
  description: 'α炭素置換基と側鎖の両方に極性基を持つアミノ酸の結合様式。 より強い結合親和性と高い立体選択性を示す（Arg, His, Trp,
    Tyr, Pheなど）。

    '
- id: single_ended_profile
  label: 片端型極性プロファイル
  type: property
  description: 'α炭素置換基のみに極性基を持ち、側鎖が疎水性のアミノ酸の結合様式。 結合自由エネルギーは両端型の約半分（Ile, Leu, Valなど）。

    '
- id: drt_model
  label: DRTモデル（直接RNAテンプレート）
  type: concept
  description: '活性化アミノ酸がRNA鋳型上に直接整列し、コード化ペプチド合成を行う 原始翻訳モデル。間接的コーディング（現代の翻訳）への進化経路を示す。

    '
- id: stereochemical_era
  label: 立体化学的時代
  type: concept
  description: '遺伝暗号の進化において、RNA-アミノ酸間の化学的親和性に基づいて コドン割り当てが行われた初期段階。約75%のアミノ酸が参加。

    '
- id: rna_world
  label: RNAワールド
  type: concept
  description: 'RNAが遺伝情報の保存と触媒機能の両方を担っていたとする 生命の起源に関する仮説。翻訳の起源もRNAワールド内で進化したと考えられる。

    '
- id: amino_acid_side_chain
  label: アミノ酸側鎖
  type: entity
  description: 'アミノ酸のα炭素に結合する可変部分。荷電・中性極性・脂肪族・芳香族など 多様な化学的性質を持ち、RNA結合部位による識別の主要な対象。

    '
- id: code_evolution
  label: 遺伝暗号の進化
  type: process
  description: '立体化学的割り当て、代謝共進化、誤り最小化適応、凍結事故の 4つの機構が複合的に現在の遺伝暗号を形成したとする進化過程。

    '
- id: statistical_analysis
  label: 統計的検定（G検定）
  type: method
  description: '結合部位内外のトリプレット頻度をG検定（Williams補正付き）で比較し、 Fisher法で独立実験の確率を統合する統計手法。

    '
- id: enantioselectivity
  label: エナンチオ選択性
  type: property
  description: 'RNA結合部位がL-アミノ酸をD-アミノ酸より選択的に結合する性質。 両端型プロファイルで10〜数千倍、片端型で1〜数十倍の選択性を示す。

    '
- id: triplet_sparseness
  label: トリプレット使用の疎性
  type: property
  description: '可能なコドン・アンチコドンのうち約21%のみが結合部位内に 有意に出現するという観察。残りの79%は負の対照として機能する。

    '
- id: coevolution_hypothesis
  label: 代謝共進化仮説
  type: concept
  description: '一部のアミノ酸が代謝経路上の前駆体アミノ酸からコドンを引き継いだとする仮説。 立体化学的コアの拡張機構の一つ。

    '
- id: error_minimization
  label: 誤り最小化
  type: concept
  description: '遺伝暗号が変異やミスリーディングの影響を最小化するよう 最適化されているとする仮説。立体化学的コアの後に作用したと考えられる。

    '
edges:
- source: rna_world_hypothesis
  target: rna_self_replication
  relation: requires
  description: RNAワールド仮説はリボザイムによるRNA自己複製の実現を前提とする。
- source: in_vitro_selection
  target: qt45_ribozyme
  relation: produces
  description: ランダム配列プールからのde novo選択により、QT45リボザイムが発見された。
- source: qt45_ribozyme
  target: complementary_strand_synthesis
  relation: causes
  description: QT45は自身を鋳型かつ触媒として相補鎖の合成を触媒する。
- source: qt45_ribozyme
  target: self_synthesis
  relation: causes
  description: QT45は(-)鎖鋳型上で自身の(+)鎖コピーを合成する。
- source: triplet_substrates
