metadata:
  title: "The nature of the last universal common ancestor and its impact on the early Earth system"
  authors:
    - Edmund R. R. Moody
    - Sandra Álvarez-Carretero
    - Tara A. Mahendrarajah
    - James W. Clark
    - Holly C. Betts
    - Nina Dombrowski
    - Xi Chen
    - Lénárd L. Szánthó
    - Gergely J. Szöllősi
    - Anja Spang
    - Richard A. Boyle
    - Stuart Daines
    - Tom A. Williams
    - Nick Lane
    - Ziheng Yang
    - Graham A. Shields
    - Davide Pisani
    - Timothy M. Lenton
    - Philip C. J. Donoghue
  journal: "Nature Ecology & Evolution"
  year: 2024
  doi: "10.1038/s41559-024-02461-1"
  description: "LUCAの年代（約42億年前）をpre-LUCA遺伝子重複のベイズ分岐時間解析により推定し、系統的reconciliationによりLUCAのゲノムサイズ（約2.75 Mb、約2,600タンパク質）と代謝能力を再構成した研究。LUCAは嫌気性酢酸生成菌であり、初期地球生態系の一部として存在していたことを示す。"

nodes:
  - id: luca
    label: "LUCA（全生物最終共通祖先）"
    type: concept
    description: "Last Universal Common Ancestor。古細菌と細菌の分岐点に位置する全生物の最終共通祖先であり、約42億年前に存在したと推定される。"

  - id: rna_world
    label: "RNAワールド"
    type: concept
    description: "RNAが遺伝情報と触媒機能の両方を担っていたとする仮説。LUCAのゲノム再構成で検出されたリボザイム（RNase P、GIR1など）やtRNA修飾酵素の存在が、RNAワールドの遺産がLUCAに引き継がれていたことを示唆する。"

  - id: genetic_code
    label: "遺伝暗号"
    type: concept
    description: "DNAの塩基配列をアミノ酸に変換するルール体系。LUCAのゲノム再構成により、完全な翻訳装置（リボソームタンパク質、tRNA合成酵素、翻訳因子）が高い確率で存在したことが示され、遺伝暗号がLUCA以前に確立されていたことを意味する。"

  - id: prebiotic_chemistry
    label: "プレバイオティック化学"
    type: concept
    description: "生命誕生以前の化学進化。LUCAの年代が約42億年前と推定されたことで、プレバイオティック化学から細胞的生命への移行までの時間的制約が明らかになった。"

  - id: divergence_time_analysis
    label: "分岐時間解析"
    type: method
    description: "ベイズ緩和分子時計法を用いて、pre-LUCA遺伝子重複から生物の分岐年代を推定する手法。MCMCtreeプログラムにより実行される。"

  - id: cross_bracing
    label: "クロスブレーシング"
    type: method
    description: "遺伝子重複後の同一種分岐イベントを対応付け、化石較正を倍増させることで年代推定の不確実性を低減する手法。"

  - id: pre_luca_paralogues
    label: "pre-LUCAパラログ"
    type: entity
    description: "LUCA以前に重複した遺伝子群（ATP合成酵素サブユニット、伸長因子、tRNA合成酵素など5つ）。LUCAの年代推定の入力データとして使用。"

  - id: phylogenetic_reconciliation
    label: "系統的reconciliation（ALE）"
    type: method
    description: "ALEアルゴリズムを用いて遺伝子系統樹と種系統樹を照合し、遺伝子の重複・水平伝播・消失の履歴を確率的に推定する手法。"

  - id: genome_reconstruction
    label: "LUCAゲノム再構成"
    type: process
    description: "LUCAに存在した遺伝子ファミリーの確率を推定し、ゲノムサイズ（約2.75 Mb）と約2,657のタンパク質をコードしていたと見積もるプロセス。"

  - id: wood_ljungdahl_pathway
    label: "Wood-Ljungdahl経路（WLP）"
    type: process
    description: "LUCAに存在したと推定される炭素固定経路。酢酸生成的成長および独立栄養的成長を可能にする代謝経路。"

  - id: acetogenesis
    label: "酢酸生成（アセトジェネシス）"
    type: process
    description: "H2とCO2から酢酸を生成する代謝。LUCAの主要なエネルギー代謝であり、低エネルギー収率だが生合成コストを削減する。"

  - id: anaerobic_metabolism
    label: "嫌気性代謝"
    type: property
    description: "LUCAは末端酸化酵素を持たず嫌気性環境で生育したと推定される。酸素を利用しない代謝様式。"

  - id: atp_synthase
    label: "ATP合成酵素"
    type: entity
    description: "LUCAに高い確率で存在した膜結合型酵素複合体（V/A型）。エネルギー通貨ATPの合成を担う。"

  - id: molecular_clock
    label: "緩和分子時計モデル"
    type: method
    description: "GBM（幾何ブラウン運動）とILN（独立対数正規）の2つの緩和時計モデルを用いて進化速度の変動を考慮した年代推定法。"

  - id: fossil_calibration
    label: "化石較正"
    type: method
    description: "13の化石記録と地球化学的記録に基づく較正点を設定し、分子時計解析の時間制約として使用する手法。"

  - id: species_tree
    label: "種系統樹"
    type: entity
    description: "57の系統マーカー遺伝子から推定された700ゲノム（古細菌350、細菌350）の最尤系統樹。"

  - id: horizontal_gene_transfer
    label: "水平遺伝子伝播（HGT）"
    type: process
    description: "種間での遺伝子の水平的な移動。ALEによるreconciliationで明示的にモデル化され、LUCA以降の遺伝子進化の推定に不可欠。"

  - id: early_earth_ecosystem
    label: "初期地球生態系"
    type: concept
    description: "LUCAが存在した約42億年前の生態系。LUCAは孤立して存在したのではなく、他の微生物代謝と共存する生態系の一部であった。"

  - id: hydrothermal_environment
    label: "熱水環境"
    type: condition
    description: "深海の熱水噴出孔やセルペンチン化による水素供給を特徴とする、LUCAの推定生息環境の一つ。逆回転酵素の存在が超好熱性を示唆。"

  - id: hydrogen_recycling
    label: "水素リサイクリング"
    type: process
    description: "メタン生成菌が放出するCH4が大気中で光化学的にH2に変換され、表層生態系に還元される地球規模の循環システム。"

  - id: prokaryote_grade_organism
    label: "原核生物グレードの生物"
    type: concept
    description: "LUCAは原始的な前遺伝子型ではなく、現代の原核生物に匹敵するゲノムサイズと複雑な代謝を持つ原核生物レベルの生物であったという結論。"

  - id: translation_machinery
    label: "翻訳装置"
    type: entity
    description: "リボソームタンパク質、アミノアシルtRNA合成酵素、翻訳開始・伸長因子など、遺伝暗号を読み取りタンパク質を合成する分子装置一式。LUCAに完全な形で存在したと推定される。"

  - id: crispr_cas_system
    label: "初期CRISPR-Casシステム"
    type: entity
    description: "LUCAに存在したと推定される原始的な免疫システム。Cas3/Cas10/Cas7などのエフェクタータンパク質を持つが、Cas1/Cas2を欠く。"

edges:
  - source: divergence_time_analysis
    target: luca
    relation: produces
    description: "分岐時間解析により、LUCAの年代が約4.2 Ga（4.09-4.33 Ga）と推定された。"

  - source: pre_luca_paralogues
    target: divergence_time_analysis
    relation: requires
    description: "LUCA以前に重複した5つのパラログ遺伝子群が分岐時間解析の入力データとなる。"

  - source: cross_bracing
    target: divergence_time_analysis
    relation: supports
    description: "クロスブレーシングにより化石較正が倍増し、年代推定の不確実性が低減される。"

  - source: fossil_calibration
    target: divergence_time_analysis
    relation: requires
    description: "13の化石較正点が分子時計解析の時間制約として必要。"

  - source: molecular_clock
    target: divergence_time_analysis
    relation: requires
    description: "GBMおよびILN緩和分子時計モデルが分岐時間解析の基盤手法として必要。"

  - source: phylogenetic_reconciliation
    target: genome_reconstruction
    relation: produces
    description: "ALEによる系統的reconciliationがLUCAの遺伝子含量とゲノムサイズの推定を生み出す。"

  - source: species_tree
    target: phylogenetic_reconciliation
    relation: requires
    description: "700ゲノムから推定された種系統樹がreconciliationの参照系統樹として必要。"

  - source: horizontal_gene_transfer
    target: phylogenetic_reconciliation
    relation: requires
    description: "水平遺伝子伝播を明示的にモデル化することがreconciliation解析の精度向上に不可欠。"

  - source: genome_reconstruction
    target: prokaryote_grade_organism
    relation: supports
    description: "ゲノム再構成の結果（約2.75 Mb、約2,657タンパク質）がLUCAの原核生物グレードの複雑性を支持する。"

  - source: genome_reconstruction
    target: wood_ljungdahl_pathway
    relation: produces
    description: "ゲノム再構成により、LUCAにWood-Ljungdahl経路のほぼ完全な遺伝子セットが存在したと推定された。"

  - source: wood_ljungdahl_pathway
    target: acetogenesis
    relation: causes
    description: "Wood-Ljungdahl経路がLUCAの酢酸生成代謝を可能にした。"

  - source: anaerobic_metabolism
    target: luca
    relation: supports
    description: "末端酸化酵素の不在がLUCAの嫌気性代謝を支持する。"

  - source: atp_synthase
    target: luca
    relation: supports
    description: "ATP合成酵素の高い存在確率（PP>0.82）がLUCAの膜結合型エネルギー代謝を支持する。"

  - source: crispr_cas_system
    target: luca
    relation: supports
    description: "初期CRISPR-Casエフェクタータンパク質の存在がLUCAにおけるウイルスとの軍拡競争を示唆する。"

  - source: acetogenesis
    target: early_earth_ecosystem
    relation: causes
    description: "LUCAの酢酸生成代謝が有機物と酢酸を供給し、他の微生物代謝のニッチを創出した。"

  - source: luca
    target: early_earth_ecosystem
    relation: contains
    description: "LUCAは初期地球生態系の一部として存在し、孤立した生物ではなかった。"

  - source: hydrothermal_environment
    target: luca
    relation: supports
    description: "深海熱水環境がH2の供給源としてLUCAの化学独立栄養的な酢酸生成代謝を支えた可能性がある。"

  - source: hydrogen_recycling
    target: early_earth_ecosystem
    relation: supports
    description: "大気中のCH4からH2への光化学的変換が表層生態系の生産性を火山由来の供給量の10倍以上に増加させた。"

  - source: luca
    target: prebiotic_chemistry
    relation: derives
    description: "LUCAの年代推定（約42億年前）はプレバイオティック化学から細胞的生命への移行の時間枠に制約を与える。"

  - source: luca
    target: prokaryote_grade_organism
    relation: derives
    description: "LUCAは原始的な前遺伝子型ではなく、現代の原核生物に匹敵する複雑な生物として特徴づけられる。"

  - source: genome_reconstruction
    target: translation_machinery
    relation: produces
    description: "ゲノム再構成により、完全なリボソーム、アミノアシルtRNA合成酵素群、翻訳因子がLUCAに存在したと推定された。"

  - source: translation_machinery
    target: genetic_code
    relation: requires
    description: "翻訳装置が機能するには遺伝暗号の体系が確立されている必要があり、LUCAにおいて遺伝暗号が既に完成していたことを示す。"

  - source: genetic_code
    target: luca
    relation: supports
    description: "完全な遺伝暗号の存在がLUCAの生物学的複雑性を支持し、遺伝暗号の確立がLUCA以前の出来事であることを意味する。"

  - source: rna_world
    target: luca
    relation: derives
    description: "LUCAのゲノムに含まれるリボザイム（RNase Pなど）やRNA修飾酵素は、RNAワールドからの遺産としてLUCAに引き継がれた分子的痕跡である。"

  - source: rna_world
    target: prebiotic_chemistry
    relation: derives
    description: "RNAワールドはプレバイオティック化学の段階で成立し、その後LUCAへと至る進化の初期段階を構成する。"
