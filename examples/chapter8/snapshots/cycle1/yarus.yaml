metadata:
  title: "RNA-Amino Acid Binding: A Stereochemical Era for the Genetic Code"
  authors:
    - Michael Yarus
    - Jeremy Joseph Widmann
    - Rob Knight
  journal: Journal of Molecular Evolution
  year: 2009
  doi: "10.1007/s00239-009-9270-1"
  description: >
    RNAアプタマー・リボスイッチ・RNP複合体の構造データを統合し、
    RNAがアミノ酸と特異的に結合する化学原理（極性プロファイル）を解明。
    337の独立結合部位の統計解析により、コグネートコドン・アンチコドンが
    結合部位内に有意に濃縮されることを示し、遺伝暗号の起源に立体化学的時代が
    存在したことを論証。DRTモデルによる翻訳起源の経路を提案。

nodes:
  - id: stereochemical_hypothesis
    label: 立体化学仮説
    type: concept
    description: >
      RNAとアミノ酸の間の直接的な化学的親和性が遺伝暗号の割り当ての基盤となったとする仮説。
      Woese (1967) とOrgel (1968) に遡る。

  - id: genetic_code
    label: 遺伝暗号
    type: concept
    description: >
      アミノ酸とコドン（3塩基配列）の対応関係。
      64コドンが20種のアミノ酸と終止信号に割り当てられている。

  - id: rna_amino_acid_binding
    label: RNA-アミノ酸結合
    type: process
    description: >
      RNAが三次構造の結合部位を形成し、特定のアミノ酸と特異的に結合するプロセス。
      水素結合・スタッキング相互作用・ファンデルワールス力が関与する。

  - id: polar_profile
    label: 極性プロファイル
    type: concept
    description: >
      RNA結合部位がアミノ酸の極性基を認識する化学的原理の要約。
      α炭素置換基と側鎖の極性基の間の距離・配置を測定する。

  - id: rna_aptamer
    label: RNAアプタマー
    type: entity
    description: >
      ランダム配列ライブラリからin vitro選択（SELEX）により
      特定のリガンドに結合するよう選抜されたRNA分子。

  - id: riboswitch
    label: リボスイッチ
    type: entity
    description: >
      mRNA内に存在し、小分子リガンドの結合により遺伝子発現を制御するRNA構造要素。
      SAMリボスイッチやリジンリボスイッチなどが知られる。

  - id: cognate_triplet
    label: コグネートトリプレット
    type: concept
    description: >
      特定のアミノ酸に対応するコドンまたはアンチコドンの3塩基配列。
      結合部位内に統計的に有意に濃縮されていることが示された。

  - id: codon_anticodon_concentration
    label: コドン・アンチコドン濃縮
    type: property
    description: >
      アミノ酸結合部位内にコグネートコドン・アンチコドンが
      非部位領域と比較して有意に高頻度で出現する現象（P=5.3×10⁻⁴⁵）。

  - id: in_vitro_selection
    label: in vitro選択（SELEX）
    type: method
    description: >
      ランダムRNA配列ライブラリからアミノ酸に結合するRNA分子を
      繰り返し選択・増幅する実験手法。

  - id: binding_site
    label: RNA結合部位
    type: entity
    description: >
      RNA分子内でアミノ酸と特異的に相互作用する領域。
      337の独立した結合部位が8種のアミノ酸について同定された。

  - id: double_ended_profile
    label: 両端型極性プロファイル
    type: property
    description: >
      α炭素置換基と側鎖の両方に極性基を持つアミノ酸の結合様式。
      より強い結合親和性と高い立体選択性を示す（Arg, His, Trp, Tyr, Pheなど）。

  - id: single_ended_profile
    label: 片端型極性プロファイル
    type: property
    description: >
      α炭素置換基のみに極性基を持ち、側鎖が疎水性のアミノ酸の結合様式。
      結合自由エネルギーは両端型の約半分（Ile, Leu, Valなど）。

  - id: drt_model
    label: DRTモデル（直接RNAテンプレート）
    type: concept
    description: >
      活性化アミノ酸がRNA鋳型上に直接整列し、コード化ペプチド合成を行う
      原始翻訳モデル。間接的コーディング（現代の翻訳）への進化経路を示す。

  - id: stereochemical_era
    label: 立体化学的時代
    type: concept
    description: >
      遺伝暗号の進化において、RNA-アミノ酸間の化学的親和性に基づいて
      コドン割り当てが行われた初期段階。約75%のアミノ酸が参加。

  - id: rna_world
    label: RNAワールド
    type: concept
    description: >
      RNAが遺伝情報の保存と触媒機能の両方を担っていたとする
      生命の起源に関する仮説。翻訳の起源もRNAワールド内で進化したと考えられる。

  - id: amino_acid_side_chain
    label: アミノ酸側鎖
    type: entity
    description: >
      アミノ酸のα炭素に結合する可変部分。荷電・中性極性・脂肪族・芳香族など
      多様な化学的性質を持ち、RNA結合部位による識別の主要な対象。

  - id: code_evolution
    label: 遺伝暗号の進化
    type: process
    description: >
      立体化学的割り当て、代謝共進化、誤り最小化適応、凍結事故の
      4つの機構が複合的に現在の遺伝暗号を形成したとする進化過程。

  - id: statistical_analysis
    label: 統計的検定（G検定）
    type: method
    description: >
      結合部位内外のトリプレット頻度をG検定（Williams補正付き）で比較し、
      Fisher法で独立実験の確率を統合する統計手法。

  - id: enantioselectivity
    label: エナンチオ選択性
    type: property
    description: >
      RNA結合部位がL-アミノ酸をD-アミノ酸より選択的に結合する性質。
      両端型プロファイルで10〜数千倍、片端型で1〜数十倍の選択性を示す。

  - id: triplet_sparseness
    label: トリプレット使用の疎性
    type: property
    description: >
      可能なコドン・アンチコドンのうち約21%のみが結合部位内に
      有意に出現するという観察。残りの79%は負の対照として機能する。

  - id: coevolution_hypothesis
    label: 代謝共進化仮説
    type: concept
    description: >
      一部のアミノ酸が代謝経路上の前駆体アミノ酸からコドンを引き継いだとする仮説。
      立体化学的コアの拡張機構の一つ。

  - id: error_minimization
    label: 誤り最小化
    type: concept
    description: >
      遺伝暗号が変異やミスリーディングの影響を最小化するよう
      最適化されているとする仮説。立体化学的コアの後に作用したと考えられる。

edges:
  - source: stereochemical_hypothesis
    target: genetic_code
    relation: supports
    description: >
      立体化学仮説はRNA-アミノ酸間の直接的な化学的相互作用が
      遺伝暗号の起源の基盤であったと主張する。

  - source: rna_amino_acid_binding
    target: stereochemical_hypothesis
    relation: supports
    description: >
      RNA結合部位でのアミノ酸結合の実験的実証が立体化学仮説を裏付ける。

  - source: polar_profile
    target: rna_amino_acid_binding
    relation: causes
    description: >
      極性プロファイルの原理がRNAによるアミノ酸認識の化学的メカニズムを規定する。

  - source: rna_aptamer
    target: binding_site
    relation: contains
    description: >
      in vitro選択されたRNAアプタマーはアミノ酸結合部位を含む。

  - source: riboswitch
    target: binding_site
    relation: contains
    description: >
      天然のリボスイッチはアミノ酸（SAM、リジン等）の結合部位を含む。

  - source: in_vitro_selection
    target: rna_aptamer
    relation: produces
    description: >
      SELEX法によりランダムRNAライブラリから特定アミノ酸に結合するアプタマーを選抜する。

  - source: binding_site
    target: cognate_triplet
    relation: contains
    description: >
      アミノ酸結合部位内にコグネートコドン・アンチコドン配列が
      非部位領域より有意に高頻度で存在する。

  - source: cognate_triplet
    target: codon_anticodon_concentration
    relation: causes
    description: >
      コグネートトリプレットの結合部位内への偏在が
      統計的に有意な濃縮現象として観測される。

  - source: statistical_analysis
    target: codon_anticodon_concentration
    relation: supports
    description: >
      G検定とFisher法による統計解析がコドン・アンチコドン濃縮の
      有意性を確認（P=5.3×10⁻⁴⁵、P=2.1×10⁻⁴⁶）。

  - source: codon_anticodon_concentration
    target: stereochemical_era
    relation: supports
    description: >
      結合部位内のコグネートトリプレット濃縮が
      遺伝暗号に立体化学的時代が存在したことの証拠となる。

  - source: amino_acid_side_chain
    target: polar_profile
    relation: causes
    description: >
      アミノ酸側鎖の化学的性質（極性・疎水性・芳香族性）が
      極性プロファイルの両端型/片端型を決定する。

  - source: polar_profile
    target: double_ended_profile
    relation: derives
    description: >
      極性側鎖を持つアミノ酸は両端型極性プロファイルに分類され、
      より強い結合と高い選択性を示す。

  - source: polar_profile
    target: single_ended_profile
    relation: derives
    description: >
      脂肪族側鎖のアミノ酸は片端型極性プロファイルに分類され、
      α炭素置換基のみでRNAに結合する。

  - source: double_ended_profile
    target: enantioselectivity
    relation: causes
    description: >
      両端型プロファイルのアミノ酸は複数の接触点を持つため、
      高いエナンチオ選択性（10〜数千倍）を示す。

  - source: stereochemical_era
    target: drt_model
    relation: supports
    description: >
      立体化学的時代のRNA-アミノ酸相互作用がDRTモデルにおける
      原始的コード化翻訳の基盤となる。

  - source: drt_model
    target: code_evolution
    relation: causes
    description: >
      DRTモデルは直接テンプレートから間接コーディング（現代の翻訳）への
      段階的進化経路を提示する。

  - source: rna_world
    target: drt_model
    relation: supports
    description: >
      RNAワールド仮説はDRTモデルが想定するRNA主導の翻訳起源と整合する。

  - source: coevolution_hypothesis
    target: code_evolution
    relation: supports
    description: >
      代謝共進化仮説は立体化学的コア以外のアミノ酸の
      コドン割り当て機構を説明する。

  - source: error_minimization
    target: code_evolution
    relation: supports
    description: >
      誤り最小化適応は立体化学的コアの確立後に遺伝暗号を
      さらに最適化する過程として作用した。

  - source: triplet_sparseness
    target: stereochemical_era
    relation: supports
    description: >
      トリプレット使用の疎性（21%）は、立体化学的時代に
      一部のコドンのみが割り当てられ、残りは他の機構で追加されたことを示唆する。

  - source: rna_amino_acid_binding
    target: enantioselectivity
    relation: produces
    description: >
      RNA結合部位によるアミノ酸結合はL体とD体を区別する
      エナンチオ選択性を生み出す。
