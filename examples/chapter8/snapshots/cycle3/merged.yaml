metadata:
  title: 概念ネットワーク統合 — 生命の起源に関する3論文
  description: Gianni, Moody, Yarus の3論文から抽出した概念ネットワークの統合
  sources:
  - title: A small polymerase ribozyme that can synthesize itself and its complementary
      strand
    authors:
    - Edoardo Gianni
    - Samantha L. Y. Kwok
    - Christopher J. K. Wan
    - Kevin Goeij
    - Bryce E. Clifton
    - Enrico S. Colizzi
    - James Attwater
    - Philipp Holliger
    journal: Science
    year: 2026
    doi: 10.1126/science.adt2760
    description: ランダム配列プールから発見された45ヌクレオチドのポリメラーゼリボザイム（QT45）が、トリヌクレオチド三リン酸基質を用いて一般的なRNA鋳型依存RNA合成を触媒し、自身の相補鎖と自身のコピーを合成できることを示した研究
  - title: The nature of the last universal common ancestor and its impact on the
      early Earth system
    authors:
    - Edmund R. R. Moody
    - Sandra Álvarez-Carretero
    - Tara A. Mahendrarajah
    - James W. Clark
    - Holly C. Betts
    - Nina Dombrowski
    - Xi Chen
    - Lénárd L. Szánthó
    - Gergely J. Szöllősi
    - Anja Spang
    - Richard A. Boyle
    - Stuart Daines
    - Tom A. Williams
    - Nick Lane
    - Ziheng Yang
    - Graham A. Shields
    - Davide Pisani
    - Timothy M. Lenton
    - Philip C. J. Donoghue
    journal: Nature Ecology & Evolution
    year: 2024
    doi: 10.1038/s41559-024-02461-1
    description: LUCAの年代（約42億年前）をpre-LUCA遺伝子重複のベイズ分岐時間解析により推定し、系統的reconciliationによりLUCAのゲノムサイズ（約2.75
      Mb、約2,600タンパク質）と代謝能力を再構成した研究。LUCAは嫌気性酢酸生成菌であり、初期地球生態系の一部として存在していたことを示す。
  - title: 'RNA-Amino Acid Binding: A Stereochemical Era for the Genetic Code'
    authors:
    - Michael Yarus
    - Jeremy Joseph Widmann
    - Rob Knight
    journal: Journal of Molecular Evolution
    year: 2009
    doi: 10.1007/s00239-009-9270-1
    description: 'RNAアプタマー・リボスイッチ・RNP複合体の構造データを統合し、 RNAがアミノ酸と特異的に結合する化学原理（極性プロファイル）を解明。
      337の独立結合部位の統計解析により、コグネートコドン・アンチコドンが 結合部位内に有意に濃縮されることを示し、遺伝暗号の起源に立体化学的時代が 存在したことを論証。DRTモデルによる翻訳起源の経路を提案。

      '
nodes:
- id: rna_world
  label: RNAワールド
  type: concept
  description: RNAが遺伝情報と触媒機能の両方を担っていたとする仮説。QT45の発見はこの仮説の妥当性を支持する
- id: rna_self_replication
  label: RNA自己複製
  type: process
  description: リボザイムが自身の(+)鎖と相補的な(-)鎖の両方を合成する自己複製サイクル
- id: in_vitro_selection
  label: in vitro選択
  type: method
  description: ランダム配列プールからポリメラーゼ活性を持つRNA配列を選択・進化させる手法
- id: prebiotic_chemistry
  label: プレバイオティック化学
  type: concept
  description: 初期地球における非酵素的なRNA重合やオリゴマー生成を含むプレバイオティック化学過程
- id: qt45_ribozyme
  label: QT45リボザイム
  type: entity
  description: ランダム配列プールから発見された45ヌクレオチドのRNA依存RNAポリメラーゼリボザイム
- id: triplet_substrate
  label: トリヌクレオチド三リン酸基質
  type: entity
  description: QT45が使用する三塩基単位（トリプレット）の基質。構造化鋳型のコピーと鎖再アニーリング抑制を可能にする
- id: rna_polymerase_activity
  label: RNAポリメラーゼ活性
  type: process
  description: RNA鋳型に依存したホスホジエステル結合形成による反復的なRNA合成触媒活性
- id: eutectic_ice
  label: 共晶氷
  type: condition
  description: リボザイムを安定化し基質を濃縮する弱アルカリ性共晶氷環境（-7度C）
- id: replication_fidelity
  label: 複製忠実度
  type: property
  description: QT45による全長産物合成のヌクレオチドあたり忠実度（92.6-94.1%）
- id: fitness_landscape
  label: 適応度地形
  type: concept
  description: QT45の全単一変異・98%の二重変異について測定された機能適応度の包括的マッピング
- id: class_i_polymerase
  label: クラスIポリメラーゼリボザイム
  type: entity
  description: クラスIリガーゼリボザイム由来の既存のRNAポリメラーゼリボザイム群（150-300nt）
- id: strand_inhibition
  label: 鎖阻害問題
  type: problem
  description: (+)鎖と(-)鎖が二本鎖を形成して不活性な行き止まり産物となり、自己複製を阻害する問題
- id: folding_equilibrium
  label: フォールディング平衡
  type: process
  description: QT45が触媒として折り畳まれた状態と鋳型として展開された状態の間で動的平衡を保つ過程
- id: error_threshold
  label: エラー閾値（Eigen限界）
  type: concept
  description: 遺伝情報を維持できる最大配列長を規定する複製忠実度の理論的下限
- id: hammerhead_ribozyme
  label: ハンマーヘッドリボザイム
  type: entity
  description: QT45によって合成された33ntのエンドヌクレアーゼリボザイム。合成されたRNA産物が機能的であることを実証
- id: ribozyme_size
  label: リボザイムサイズ
  type: property
  description: QT45は45ヌクレオチドという小ささにより、自己複製の合成負荷軽減と自発的出現の容易化を実現
- id: sequence_space_abundance
  label: 配列空間における存在頻度
  type: concept
  description: ランダム配列プールにおけるポリメラーゼモチーフの存在頻度が従来の想定より高いことを示唆する発見
- id: rna_recombination
  label: RNA組換え
  type: process
  description: トランスエステル化によるRNA断片間の非酵素的組換え。進化を加速しMullerのラチェットを緩和する
- id: structured_template_copying
  label: 構造化鋳型コピー
  type: process
  description: ステムループ等の二次構造を持つRNA鋳型の逆相補鎖を合成する能力
- id: ph_freeze_thaw_cycle
  label: pH凍結融解サイクル
  type: method
  description: 二本鎖RNAの鎖分離とRNA複製を可能にする反復的なpH変化と凍結融解のサイクル
- id: luca
  label: LUCA（全生物最終共通祖先）
  type: concept
  description: Last Universal Common Ancestor。古細菌と細菌の分岐点に位置する全生物の最終共通祖先であり、約42億年前に存在したと推定される。
- id: genetic_code
  label: 遺伝暗号
  type: concept
  description: DNAの塩基配列をアミノ酸に変換するルール体系。LUCAのゲノム再構成により、完全な翻訳装置（リボソームタンパク質、tRNA合成酵素、翻訳因子）が高い確率で存在したことが示され、遺伝暗号がLUCA以前に確立されていたことを意味する。
- id: divergence_time_analysis
  label: 分岐時間解析
  type: method
  description: ベイズ緩和分子時計法を用いて、pre-LUCA遺伝子重複から生物の分岐年代を推定する手法。MCMCtreeプログラムにより実行される。
- id: cross_bracing
  label: クロスブレーシング
  type: method
  description: 遺伝子重複後の同一種分岐イベントを対応付け、化石較正を倍増させることで年代推定の不確実性を低減する手法。
- id: pre_luca_paralogues
  label: pre-LUCAパラログ
  type: entity
  description: LUCA以前に重複した遺伝子群（ATP合成酵素サブユニット、伸長因子、tRNA合成酵素など5つ）。LUCAの年代推定の入力データとして使用。
- id: phylogenetic_reconciliation
  label: 系統的reconciliation（ALE）
  type: method
  description: ALEアルゴリズムを用いて遺伝子系統樹と種系統樹を照合し、遺伝子の重複・水平伝播・消失の履歴を確率的に推定する手法。
- id: genome_reconstruction
  label: LUCAゲノム再構成
  type: process
  description: LUCAに存在した遺伝子ファミリーの確率を推定し、ゲノムサイズ（約2.75 Mb）と約2,657のタンパク質をコードしていたと見積もるプロセス。
- id: wood_ljungdahl_pathway
  label: Wood-Ljungdahl経路（WLP）
  type: process
  description: LUCAに存在したと推定される炭素固定経路。酢酸生成的成長および独立栄養的成長を可能にする代謝経路。
- id: acetogenesis
  label: 酢酸生成（アセトジェネシス）
  type: process
  description: H2とCO2から酢酸を生成する代謝。LUCAの主要なエネルギー代謝であり、低エネルギー収率だが生合成コストを削減する。
- id: anaerobic_metabolism
  label: 嫌気性代謝
  type: property
  description: LUCAは末端酸化酵素を持たず嫌気性環境で生育したと推定される。酸素を利用しない代謝様式。
- id: atp_synthase
  label: ATP合成酵素
  type: entity
  description: LUCAに高い確率で存在した膜結合型酵素複合体（V/A型）。エネルギー通貨ATPの合成を担う。
- id: molecular_clock
  label: 緩和分子時計モデル
  type: method
  description: GBM（幾何ブラウン運動）とILN（独立対数正規）の2つの緩和時計モデルを用いて進化速度の変動を考慮した年代推定法。
- id: fossil_calibration
  label: 化石較正
  type: method
  description: 13の化石記録と地球化学的記録に基づく較正点を設定し、分子時計解析の時間制約として使用する手法。
- id: species_tree
  label: 種系統樹
  type: entity
  description: 57の系統マーカー遺伝子から推定された700ゲノム（古細菌350、細菌350）の最尤系統樹。
- id: horizontal_gene_transfer
  label: 水平遺伝子伝播（HGT）
  type: process
  description: 種間での遺伝子の水平的な移動。ALEによるreconciliationで明示的にモデル化され、LUCA以降の遺伝子進化の推定に不可欠。
- id: early_earth_ecosystem
  label: 初期地球生態系
  type: concept
  description: LUCAが存在した約42億年前の生態系。LUCAは孤立して存在したのではなく、他の微生物代謝と共存する生態系の一部であった。
- id: hydrothermal_environment
  label: 熱水環境
  type: condition
  description: 深海の熱水噴出孔やセルペンチン化による水素供給を特徴とする、LUCAの推定生息環境の一つ。逆回転酵素の存在が超好熱性を示唆。
- id: hydrogen_recycling
  label: 水素リサイクリング
  type: process
  description: メタン生成菌が放出するCH4が大気中で光化学的にH2に変換され、表層生態系に還元される地球規模の循環システム。
- id: prokaryote_grade_organism
  label: 原核生物グレードの生物
  type: concept
  description: LUCAは原始的な前遺伝子型ではなく、現代の原核生物に匹敵するゲノムサイズと複雑な代謝を持つ原核生物レベルの生物であったという結論。
- id: translation_machinery
  label: 翻訳装置
  type: entity
  description: リボソームタンパク質、アミノアシルtRNA合成酵素、翻訳開始・伸長因子など、遺伝暗号を読み取りタンパク質を合成する分子装置一式。LUCAに完全な形で存在したと推定される。
- id: crispr_cas_system
  label: 初期CRISPR-Casシステム
  type: entity
  description: LUCAに存在したと推定される原始的な免疫システム。Cas3/Cas10/Cas7などのエフェクタータンパク質を持つが、Cas1/Cas2を欠く。
- id: stereochemical_hypothesis
  label: 立体化学仮説
  type: concept
  description: 'RNAとアミノ酸の間の直接的な化学的親和性が遺伝暗号の割り当ての基盤となったとする仮説。 Woese (1967) とOrgel (1968)
    に遡る。

    '
- id: rna_amino_acid_binding
  label: RNA-アミノ酸結合
  type: process
  description: 'RNAが三次構造の結合部位を形成し、特定のアミノ酸と特異的に結合するプロセス。 水素結合・スタッキング相互作用・ファンデルワールス力が関与する。

    '
- id: polar_profile
  label: 極性プロファイル
  type: concept
  description: 'RNA結合部位がアミノ酸の極性基を認識する化学的原理の要約。 α炭素置換基と側鎖の極性基の間の距離・配置を測定する。

    '
- id: rna_aptamer
  label: RNAアプタマー
  type: entity
  description: 'ランダム配列ライブラリからin vitro選択（SELEX）により 特定のリガンドに結合するよう選抜されたRNA分子。

    '
- id: riboswitch
  label: リボスイッチ
  type: entity
  description: 'mRNA内に存在し、小分子リガンドの結合により遺伝子発現を制御するRNA構造要素。 SAMリボスイッチやリジンリボスイッチなどが知られる。

    '
- id: cognate_triplet
  label: コグネートトリプレット
  type: concept
  description: '特定のアミノ酸に対応するコドンまたはアンチコドンの3塩基配列。 結合部位内に統計的に有意に濃縮されていることが示された。

    '
- id: codon_anticodon_enrichment
  label: コドン・アンチコドン濃縮
  type: property
  description: 'アミノ酸結合部位内にコグネートコドン・アンチコドンが 非部位領域と比較して有意に高頻度で出現する現象（P=5.3×10⁻⁴⁵）。

    '
- id: binding_site
  label: RNA結合部位
  type: entity
  description: 'RNA分子内でアミノ酸と特異的に相互作用する領域。 337の独立した結合部位が8種のアミノ酸について同定された。

    '
- id: double_ended_profile
  label: 両端型極性プロファイル
  type: property
  description: 'α炭素置換基と側鎖の両方に極性基を持つアミノ酸の結合様式。 より強い結合親和性と高い立体選択性を示す（Arg, His, Trp,
    Tyr, Pheなど）。

    '
- id: single_ended_profile
  label: 片端型極性プロファイル
  type: property
  description: 'α炭素置換基のみに極性基を持ち、側鎖が疎水性のアミノ酸の結合様式。 結合自由エネルギーは両端型の約半分（Ile, Leu, Valなど）。

    '
- id: drt_model
  label: DRTモデル（直接RNAテンプレート）
  type: concept
  description: '活性化アミノ酸がRNA鋳型上に直接整列し、コード化ペプチド合成を行う 原始翻訳モデル。間接的コーディング（現代の翻訳）への進化経路を示す。

    '
- id: stereochemical_era
  label: 立体化学的時代
  type: concept
  description: '遺伝暗号の進化において、RNA-アミノ酸間の化学的親和性に基づいて コドン割り当てが行われた初期段階。約75%のアミノ酸が参加。

    '
- id: amino_acid_side_chain
  label: アミノ酸側鎖
  type: entity
  description: 'アミノ酸のα炭素に結合する可変部分。荷電・中性極性・脂肪族・芳香族など 多様な化学的性質を持ち、RNA結合部位による識別の主要な対象。

    '
- id: code_evolution
  label: 遺伝暗号の進化
  type: process
  description: '立体化学的割り当て、代謝共進化、誤り最小化適応、凍結事故の 4つの機構が複合的に現在の遺伝暗号を形成したとする進化過程。

    '
- id: statistical_test
  label: 統計的検定（G検定）
  type: method
  description: '結合部位内外のトリプレット頻度をG検定（Williams補正付き）で比較し、 Fisher法で独立実験の確率を統合する統計手法。

    '
- id: enantioselectivity
  label: エナンチオ選択性
  type: property
  description: 'RNA結合部位がL-アミノ酸をD-アミノ酸より選択的に結合する性質。 両端型プロファイルで10〜数千倍、片端型で1〜数十倍の選択性を示す。

    '
- id: triplet_sparseness
  label: トリプレット使用の疎性
  type: property
  description: '可能なコドン・アンチコドンのうち約21%のみが結合部位内に 有意に出現するという観察。残りの79%は負の対照として機能する。

    '
- id: coevolution_hypothesis
  label: 代謝共進化仮説
  type: concept
  description: '一部のアミノ酸が代謝経路上の前駆体アミノ酸からコドンを引き継いだとする仮説。 立体化学的コアの拡張機構の一つ。

    '
- id: error_minimization
  label: 誤り最小化
  type: concept
  description: '遺伝暗号が変異やミスリーディングの影響を最小化するよう 最適化されているとする仮説。立体化学的コアの後に作用したと考えられる。

    '
edges:
- source: rna_world
  target: rna_self_replication
  relation: requires
  description: RNAワールド仮説はRNA自己複製の実現を前提条件とする
- source: in_vitro_selection
  target: qt45_ribozyme
  relation: produces
  description: ランダム配列プールからのde novo選択と進化（計18ラウンド）によりQT45リボザイムが発見された
- source: qt45_ribozyme
  target: rna_polymerase_activity
  relation: produces
  description: QT45はRNA鋳型依存RNA合成を触媒するポリメラーゼ活性を持つ
- source: triplet_substrate
  target: rna_polymerase_activity
  relation: requires
  description: QT45のポリメラーゼ活性はトリヌクレオチド三リン酸基質を主に使用する
- source: eutectic_ice
  target: rna_polymerase_activity
  relation: supports
  description: 共晶氷環境がリボザイムの安定化と基質の濃縮によりポリメラーゼ活性を促進する
- source: qt45_ribozyme
  target: rna_self_replication
  relation: supports
  description: QT45は(+)鎖と(-)鎖の両方を合成でき、自己複製サイクルの要件を満たす
- source: replication_fidelity
  target: error_threshold
  relation: requires
  description: 持続的な自己複製にはEigenのエラー閾値を超える複製忠実度が必要
- source: qt45_ribozyme
  target: replication_fidelity
  relation: produces
  description: QT45は全長産物に対して92.6-94.1%のヌクレオチドあたり忠実度を示す
- source: strand_inhibition
  target: rna_self_replication
  relation: inhibits
  description: (+)(-)鎖二本鎖の形成が自己複製サイクルの完結を阻害する主要な障壁
- source: folding_equilibrium
  target: rna_self_replication
  relation: supports
  description: 折り畳み平衡により同一反応内でQT45が触媒と鋳型の両方として機能できる
- source: triplet_substrate
  target: folding_equilibrium
  relation: causes
  description: トリプレット基質の結合が鋳型鎖の展開を促進し、フォールディング平衡をシフトさせる
- source: ribozyme_size
  target: rna_self_replication
  relation: supports
  description: 45ntという小さなサイズが合成負荷を軽減し自己複製を容易にする
- source: ribozyme_size
  target: prebiotic_chemistry
  relation: supports
  description: 小さなサイズにより非酵素的RNA重合で到達可能な長さに近づき、自発的出現の可能性が高まる
- source: class_i_polymerase
  target: rna_self_replication
  relation: inhibits
  description: クラスIポリメラーゼは大きすぎて（150-300nt）自身の複製も自発的出現も困難
- source: qt45_ribozyme
