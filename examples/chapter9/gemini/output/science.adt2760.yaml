# ## 概要把握
# 主要な主張: 45塩基の小型RNAポリメラーゼリボザイム（QT45）が、トリプレット基質を用いて自身の複製が可能であることを示した。
# 研究の手法: ランダム配列プールからのin vitro選択により、トリプレットを基質とするリボザイムを同定し、活性と忠実度を評価した。
# 主要な結果: QT45は94.1%の忠実度でRNA合成を行い、構造を持つRNAや自身の相補鎖・同一鎖の合成に成功した。共晶氷が活性を支える。
# 理論的意義: RNAワールドにおけるリボザイムのサイズと機能の矛盾（パラドックス）を解消し、生命の起源の可能性を広げた。

metadata:
  title: "A small polymerase ribozyme that can synthesize itself and its complementary strand"
  authors:
